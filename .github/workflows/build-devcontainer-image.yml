name: build-devcontainer-image

# Builds the workshop dev-container image and pushes it to GHCR.
# Runs on demand (the "Run workflow" button in the Actions tab) and automatically
# whenever the Dockerfile changes. This is the low-maintenance alternative to
# running scripts/build-image.sh locally — it uses the built-in GITHUB_TOKEN, so
# there's no personal access token to manage.
#
# After the FIRST successful run: make the package PUBLIC and confirm the repo has
# access — github.com/orgs/Plant-Success/packages → ai-in-science-workshop →
# Package settings. (Codespaces from this repo, and from copies of it, need the
# image to be public to pull it without authenticating.)
#
# If the push step 403s: an org owner needs to allow Actions to write packages
# (Org Settings → Actions → Workflow permissions; and/or the package's settings).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".devcontainer/Dockerfile"
      - ".github/workflows/build-devcontainer-image.yml"

permissions:
  contents: read
  packages: write          # lets GITHUB_TOKEN push to ghcr.io/<org>/...

env:
  IMAGE: ghcr.io/plant-success/ai-in-science-workshop   # GHCR namespace must be lowercase

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
